# ============================================================
#  .github/workflows/weekly-deploy.yml
#
#  ⚠️  CURRENTLY IN TEST MODE — fires every 2 minutes
#  Before going live, change the cron back to: "0 23 * * 0"
#  (every Sunday at 23:00 UTC)
# ============================================================

name: Weekly Blog Deploy

on:
  # ── TEST MODE: every 2 minutes ────────────────────────────
  # ⚠️ Change to "0 23 * * 0" for weekly production schedule
  schedule:
    - cron: "*/2 * * * *"

  # ── Also trigger on any push to main ─────────────────────
  push:
    branches:
      - main

  # ── Manual trigger from GitHub Actions UI ─────────────────
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Trigger Vercel Deployment
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP %{http_code}\n"

      - name: Summary
        run: |
          echo "### ✅ Deploy triggered" >> $GITHUB_STEP_SUMMARY
          echo "Vercel will build from the latest \`main\` branch." >> $GITHUB_STEP_SUMMARY
