# ============================================================
#  .github/workflows/weekly-deploy.yml
#
#  What this does:
#    1. Runs automatically every Sunday at 23:00 UTC
#       (1 hour after the Apps Script syncs blogs.json at 22:00)
#    2. Also runs on every push to main (standard Vercel behaviour)
#    3. Builds the Vite + React app
#    4. Triggers a Vercel production deployment via Vercel Deploy Hook
#
#  Required GitHub repository secrets (Settings → Secrets → Actions):
#    VERCEL_DEPLOY_HOOK_URL  → paste your Vercel Deploy Hook URL here
#
#  How to get your Vercel Deploy Hook URL:
#    Vercel Dashboard → your project → Settings → Git → Deploy Hooks
#    → Create a hook named "weekly-blog-sync" targeting branch "main"
#    → Copy the URL and add it as the GitHub secret above.
# ============================================================

name: Weekly Blog Deploy

on:
  # ── Automatic: every Sunday at 23:00 UTC ──────────────────
  schedule:
    - cron: "0 23 * * 0"

  # ── Also trigger on any push to main ─────────────────────
  push:
    branches:
      - main

  # ── Manual trigger from GitHub Actions UI ─────────────────
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the repo ───────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node (for the Vite build) ───────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install dependencies ────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build the Vite app ──────────────────────────────
      - name: Build
        run: npm run build

      # ── 5. Trigger Vercel deploy hook ─────────────────────
      #   The deploy hook tells Vercel to pull the latest main
      #   branch and publish it.  No Vercel CLI needed.
      - name: Trigger Vercel Deployment
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP %{http_code}\n"

      # ── 6. Log summary ─────────────────────────────────────
      - name: Summary
        run: |
          echo "### ✅ Deploy triggered" >> $GITHUB_STEP_SUMMARY
          echo "Vercel will build from the latest \`main\` branch." >> $GITHUB_STEP_SUMMARY
          echo "Check the Vercel dashboard for live status." >> $GITHUB_STEP_SUMMARY
